<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Holographic Spirograph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #settings-panel {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  height: 100%;
  background: rgba(10, 10, 10, 0.95);
  color: #ccc;
  padding: 20px;
  overflow-y: auto;
  transition: right 0.3s ease;
  z-index: 100;
  font-family: -apple-system, sans-serif;
  font-size: 14px;
}
#settings-panel.visible { right: 0; }
#settings-panel label { display: block; margin-top: 12px; color: #888; font-size: 12px; text-transform: uppercase; }
#settings-panel select, #settings-panel input[type="range"] { width: 100%; margin-top: 4px; }
#settings-panel select { background: #222; color: #ccc; border: 1px solid #444; padding: 6px; border-radius: 4px; }
#settings-panel input[type="range"] { accent-color: #88ccff; }
.settings-header { display: flex; justify-content: space-between; align-items: center; }
.settings-header h2 { margin: 0; font-size: 18px; color: #fff; }
#settings-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
.range-value { color: #88ccff; font-size: 12px; }
#settings-panel hr { border: none; border-top: 1px solid #333; margin: 16px 0; }
#settings-panel h3 { color: #fff; font-size: 14px; margin: 0; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
