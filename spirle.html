<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spirle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0c0c14;
    color: #c8c8d8;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
  }

  /* =====================
     Game container
  ===================== */
  .game {
    height: 100%;
    max-width: 400px;
    margin: 0 auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* =====================
     Header
  ===================== */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    height: 36px;
  }
  .header-left {
    display: flex;
    align-items: baseline;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #e8e0f0;
    text-transform: uppercase;
  }
  .puzzle-num {
    font-size: 11px;
    color: #6a6a8a;
    font-weight: 400;
    margin-left: 6px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid #2a2a3a;
    background: #14141e;
    color: #6a6a8a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
  }

  /* =====================
     Target canvas (180px circle)
  ===================== */
  .target-wrap {
    width: 180px;
    height: 180px;
    flex-shrink: 0;
    position: relative;
    border-radius: 50%;
    background: radial-gradient(circle, #141420 0%, #0c0c14 70%);
    border: 1px solid #1e1e30;
    margin: 6px 0;
  }
  .target-wrap canvas {
    width: 100%;
    height: 100%;
  }

  /* =====================
     Guess grid
  ===================== */
  .guess-grid {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    margin: 6px 0;
  }
  .grid-header {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 2px;
  }
  .grid-header span {
    text-align: center;
    font-size: 8px;
    color: #4a4a6a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .guess-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .guess-cell {
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .guess-cell canvas {
    width: 26px;
    height: 26px;
  }

  /* Cell state classes */
  .cell-intune  { background: #1a3a2a; border: 1px solid #2a6a4a; }
  .cell-close   { background: #2e2a1a; border: 1px solid #6a5a2a; }
  .cell-off     { background: #1a1a22; border: 1px solid #22222e; }
  .cell-empty   { background: #12121a; border: 1px solid #1a1a26; }
  .cell-pending { background: #161620; border: 1px solid #2a2a40; }

  /* =====================
     Divider
  ===================== */
  .divider {
    width: 50%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a3a, transparent);
    flex-shrink: 0;
    margin: 4px 0;
  }

  /* =====================
     Pickers area
  ===================== */
  .pickers-area {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    min-height: 0;
  }
  .picker-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .picker-group {
    background: #14141e;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 6px 8px;
  }
  .picker-label {
    font-size: 8px;
    color: #5a5a7a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 5px;
    text-align: center;
  }
  .picker-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 4px;
  }
  .picker-option {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid #2a2a3a;
    background: #1a1a26;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .picker-option canvas {
    width: 28px;
    height: 28px;
  }
  .picker-option:hover {
    border-color: #4a4a6a;
    background: #1e1e2e;
  }
  .picker-option.selected {
    border-color: #7a6aee;
    background: #1e1a30;
    box-shadow: 0 0 10px rgba(122, 106, 238, 0.15);
  }
  .picker-option.eliminated {
    opacity: 0.2;
    pointer-events: none;
  }
  .picker-option.confirmed {
    border-color: #2a6a4a;
    background: #1a2a22;
    pointer-events: none;
  }

  /* =====================
     Roll button
  ===================== */
  .roll-btn {
    width: 100%;
    max-width: 240px;
    height: 40px;
    border-radius: 20px;
    border: 1px solid #4a3a8a;
    background: linear-gradient(135deg, #2a1e4e, #1e1a3a);
    color: #b8a8ee;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    margin: 4px 0 6px;
  }
  .roll-btn:hover:not(:disabled) {
    border-color: #7a6aee;
    box-shadow: 0 0 20px rgba(122, 106, 238, 0.2);
    color: #d8c8ff;
  }
  .roll-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* =====================
     Guess counter
  ===================== */
  .guess-count {
    font-size: 10px;
    color: #3a3a5a;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  /* =====================
     Modal overlays
  ===================== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(12, 12, 20, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    /* Hidden by default */
    display: none;
  }
  .modal-overlay.open {
    display: flex;
  }
  .modal {
    background: #14141e;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 24px 20px 20px;
    width: 320px;
    max-width: calc(100vw - 32px);
    position: relative;
  }
  .modal-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e8e0f0;
    text-align: center;
    margin-bottom: 16px;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid #2a2a3a;
    background: #1a1a26;
    color: #6a6a8a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
  }

  /* Stats modal content */
  .stats-row {
    display: flex;
    justify-content: space-around;
    margin-bottom: 16px;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #e8e0f0;
  }
  .stat-label {
    font-size: 9px;
    color: #5a5a7a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stats-bar-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stats-bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: #6a6a8a;
  }
  .stats-bar-row .bar-label {
    width: 10px;
    text-align: right;
    flex-shrink: 0;
  }
  .stats-bar {
    flex: 1;
    height: 14px;
    background: #1a1a26;
    border-radius: 3px;
    overflow: hidden;
  }
  .stats-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2a1e4e, #4a3a8a);
    border-radius: 3px;
    min-width: 4px;
  }
  .stats-bar-fill.current {
    background: linear-gradient(90deg, #2a4e3a, #3a8a5a);
  }

  /* Settings modal content */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #1e1e2e;
  }
  .setting-row:last-child {
    border-bottom: none;
  }
  .setting-label {
    font-size: 12px;
    color: #c8c8d8;
  }
  .setting-desc {
    font-size: 9px;
    color: #5a5a7a;
    margin-top: 2px;
  }
  .toggle {
    width: 36px;
    height: 20px;
    border-radius: 10px;
    background: #2a2a3a;
    border: 1px solid #3a3a4a;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle.on {
    background: #2a4e3a;
    border-color: #3a8a5a;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6a6a8a;
    transition: transform 0.15s ease;
  }
  .toggle.on::after {
    transform: translateX(16px);
    background: #6aee9a;
  }
</style>
</head>
<body>

<div class="game">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Spirle</h1>
      <span class="puzzle-num">#1</span>
    </div>
    <div class="header-right">
      <div class="icon-btn" id="btnSound" title="Sound">&#9834;</div>
      <div class="icon-btn" id="btnStats" title="Statistics">&#9689;</div>
      <div class="icon-btn" id="btnSettings" title="Settings">&#9881;</div>
    </div>
  </div>

  <!-- Target spirograph canvas (180px circle) -->
  <div class="target-wrap">
    <canvas id="target"></canvas>
  </div>

  <!-- Guess grid — JS will populate rows -->
  <div class="guess-grid" id="guessGrid">
    <div class="grid-header">
      <span>Outer</span>
      <span>Inner</span>
      <span>Size</span>
      <span>Reach</span>
    </div>
    <!-- rows injected by game script -->
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Pickers area — JS will populate -->
  <div class="pickers-area" id="pickersArea">
    <!-- picker-row elements injected by game script -->
  </div>

  <!-- Roll button (disabled until a full selection is made) -->
  <button class="roll-btn" id="rollBtn" disabled>Roll</button>

  <!-- Guess counter -->
  <div class="guess-count" id="guessCount">0 of 6</div>

</div><!-- /.game -->


<!-- =====================
     Stats modal
===================== -->
<div class="modal-overlay" id="statsModal">
  <div class="modal">
    <div class="modal-title">Statistics</div>
    <div class="modal-close" id="statsClose">&#10005;</div>

    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-value" id="statPlayed">0</span>
        <span class="stat-label">Played</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statWin">0%</span>
        <span class="stat-label">Win %</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statStreak">0</span>
        <span class="stat-label">Streak</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statMax">0</span>
        <span class="stat-label">Best</span>
      </div>
    </div>

    <div class="stats-bar-section" id="statsDistribution">
      <!-- Distribution bars: 1 through 6 -->
      <div class="stats-bar-row">
        <span class="bar-label">1</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">2</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">3</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">4</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">5</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">6</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- =====================
     Settings modal
===================== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">Settings</div>
    <div class="modal-close" id="settingsClose">&#10005;</div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Hard Mode</div>
        <div class="setting-desc">Confirmed picks must stay in all future guesses</div>
      </div>
      <div class="toggle" id="toggleHard"></div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">High Contrast</div>
        <div class="setting-desc">Improves color visibility</div>
      </div>
      <div class="toggle" id="toggleContrast"></div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Reduce Motion</div>
        <div class="setting-desc">Skips draw animation on the target</div>
      </div>
      <div class="toggle" id="toggleMotion"></div>
    </div>
  </div>
</div>


<script>
// Game code will go here (added in later tasks)
</script>
</body>
</html>
