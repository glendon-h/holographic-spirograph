<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spirle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0c0c14;
    color: #c8c8d8;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
  }

  /* =====================
     Game container
  ===================== */
  .game {
    height: 100%;
    max-width: 400px;
    margin: 0 auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* =====================
     Header
  ===================== */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    height: 36px;
  }
  .header-left {
    display: flex;
    align-items: baseline;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #e8e0f0;
    text-transform: uppercase;
  }
  .puzzle-num {
    font-size: 11px;
    color: #6a6a8a;
    font-weight: 400;
    margin-left: 6px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid #2a2a3a;
    background: #14141e;
    color: #6a6a8a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
  }

  /* =====================
     Target canvas (180px circle)
  ===================== */
  .target-wrap {
    width: 180px;
    height: 180px;
    flex-shrink: 0;
    position: relative;
    border-radius: 50%;
    background: radial-gradient(circle, #141420 0%, #0c0c14 70%);
    border: 1px solid #1e1e30;
    margin: 6px 0;
  }
  .target-wrap canvas {
    width: 100%;
    height: 100%;
  }

  /* =====================
     Guess grid
  ===================== */
  .guess-grid {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    margin: 6px 0;
  }
  .grid-header {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 2px;
  }
  .grid-header span {
    text-align: center;
    font-size: 8px;
    color: #4a4a6a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .guess-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .guess-cell {
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .guess-cell canvas {
    width: 26px;
    height: 26px;
  }

  /* Cell state classes */
  .cell-intune  { background: #1a3a2a; border: 1px solid #2a6a4a; }
  .cell-close   { background: #2e2a1a; border: 1px solid #6a5a2a; }
  .cell-off     { background: #1a1a22; border: 1px solid #22222e; }
  .cell-empty   { background: #12121a; border: 1px solid #1a1a26; }
  .cell-pending { background: #161620; border: 1px solid #2a2a40; }

  /* =====================
     Divider
  ===================== */
  .divider {
    width: 50%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a3a, transparent);
    flex-shrink: 0;
    margin: 4px 0;
  }

  /* =====================
     Pickers area
  ===================== */
  .pickers-area {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    min-height: 0;
  }
  .picker-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .picker-group {
    background: #14141e;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 6px 8px;
  }
  .picker-label {
    font-size: 8px;
    color: #5a5a7a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 5px;
    text-align: center;
  }
  .picker-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 4px;
  }
  .picker-option {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid #2a2a3a;
    background: #1a1a26;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .picker-option canvas {
    width: 28px;
    height: 28px;
  }
  .picker-option:hover {
    border-color: #4a4a6a;
    background: #1e1e2e;
  }
  .picker-option.selected {
    border-color: #7a6aee;
    background: #1e1a30;
    box-shadow: 0 0 10px rgba(122, 106, 238, 0.15);
  }
  .picker-option.eliminated {
    opacity: 0.2;
    pointer-events: none;
  }
  .picker-option.confirmed {
    border-color: #2a6a4a;
    background: #1a2a22;
    pointer-events: none;
  }

  /* =====================
     Roll button
  ===================== */
  .roll-btn {
    width: 100%;
    max-width: 240px;
    height: 40px;
    border-radius: 20px;
    border: 1px solid #4a3a8a;
    background: linear-gradient(135deg, #2a1e4e, #1e1a3a);
    color: #b8a8ee;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    margin: 4px 0 6px;
  }
  .roll-btn:hover:not(:disabled) {
    border-color: #7a6aee;
    box-shadow: 0 0 20px rgba(122, 106, 238, 0.2);
    color: #d8c8ff;
  }
  .roll-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* =====================
     Guess counter
  ===================== */
  .guess-count {
    font-size: 10px;
    color: #3a3a5a;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  /* =====================
     Modal overlays
  ===================== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(12, 12, 20, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    /* Hidden by default */
    display: none;
  }
  .modal-overlay.open {
    display: flex;
  }
  .modal {
    background: #14141e;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 24px 20px 20px;
    width: 320px;
    max-width: calc(100vw - 32px);
    position: relative;
  }
  .modal-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e8e0f0;
    text-align: center;
    margin-bottom: 16px;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid #2a2a3a;
    background: #1a1a26;
    color: #6a6a8a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
  }

  /* Stats modal content */
  .stats-row {
    display: flex;
    justify-content: space-around;
    margin-bottom: 16px;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #e8e0f0;
  }
  .stat-label {
    font-size: 9px;
    color: #5a5a7a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stats-bar-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stats-bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: #6a6a8a;
  }
  .stats-bar-row .bar-label {
    width: 10px;
    text-align: right;
    flex-shrink: 0;
  }
  .stats-bar {
    flex: 1;
    height: 14px;
    background: #1a1a26;
    border-radius: 3px;
    overflow: hidden;
  }
  .stats-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2a1e4e, #4a3a8a);
    border-radius: 3px;
    min-width: 4px;
  }
  .stats-bar-fill.current {
    background: linear-gradient(90deg, #2a4e3a, #3a8a5a);
  }

  /* Settings modal content */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #1e1e2e;
  }
  .setting-row:last-child {
    border-bottom: none;
  }
  .setting-label {
    font-size: 12px;
    color: #c8c8d8;
  }
  .setting-desc {
    font-size: 9px;
    color: #5a5a7a;
    margin-top: 2px;
  }
  .toggle {
    width: 36px;
    height: 20px;
    border-radius: 10px;
    background: #2a2a3a;
    border: 1px solid #3a3a4a;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle.on {
    background: #2a4e3a;
    border-color: #3a8a5a;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6a6a8a;
    transition: transform 0.15s ease;
  }
  .toggle.on::after {
    transform: translateX(16px);
    background: #6aee9a;
  }
</style>
</head>
<body>

<div class="game">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Spirle</h1>
      <span class="puzzle-num" id="puzzleNum">#1</span>
    </div>
    <div class="header-right">
      <div class="icon-btn" id="btnSound" title="Sound">&#9834;</div>
      <div class="icon-btn" id="btnStats" title="Statistics">&#9689;</div>
      <div class="icon-btn" id="btnSettings" title="Settings">&#9881;</div>
    </div>
  </div>

  <!-- Target spirograph canvas (180px circle) -->
  <div class="target-wrap">
    <canvas id="target"></canvas>
  </div>

  <!-- Guess grid — JS will populate rows -->
  <div class="guess-grid" id="guessGrid">
    <div class="grid-header">
      <span>Outer</span>
      <span>Inner</span>
      <span>Size</span>
      <span>Reach</span>
    </div>
    <!-- rows injected by game script -->
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Pickers area — JS will populate -->
  <div class="pickers-area" id="pickersArea">
    <!-- picker-row elements injected by game script -->
  </div>

  <!-- Roll button (disabled until a full selection is made) -->
  <button class="roll-btn" id="rollBtn" disabled>Roll</button>

  <!-- Guess counter -->
  <div class="guess-count" id="guessCount">0 of 6</div>

</div><!-- /.game -->


<!-- =====================
     Stats modal
===================== -->
<div class="modal-overlay" id="statsModal">
  <div class="modal">
    <div class="modal-title">Statistics</div>
    <div class="modal-close" id="statsClose">&#10005;</div>

    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-value" id="statPlayed">0</span>
        <span class="stat-label">Played</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statWin">0%</span>
        <span class="stat-label">Win %</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statStreak">0</span>
        <span class="stat-label">Streak</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statMax">0</span>
        <span class="stat-label">Best</span>
      </div>
    </div>

    <div class="stats-bar-section" id="statsDistribution">
      <!-- Distribution bars: 1 through 6 -->
      <div class="stats-bar-row">
        <span class="bar-label">1</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">2</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">3</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">4</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">5</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-bar-row">
        <span class="bar-label">6</span>
        <div class="stats-bar"><div class="stats-bar-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- =====================
     Settings modal
===================== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">Settings</div>
    <div class="modal-close" id="settingsClose">&#10005;</div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Hard Mode</div>
        <div class="setting-desc">Confirmed picks must stay in all future guesses</div>
      </div>
      <div class="toggle" id="toggleHard"></div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">High Contrast</div>
        <div class="setting-desc">Improves color visibility</div>
      </div>
      <div class="toggle" id="toggleContrast"></div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Reduce Motion</div>
        <div class="setting-desc">Skips draw animation on the target</div>
      </div>
      <div class="toggle" id="toggleMotion"></div>
    </div>
  </div>
</div>


<script>
// ==============================================
// Shape Math Engine
// ==============================================

function superformula(theta, m, n1, n2, n3) {
  const t = m * theta / 4;
  const t1 = Math.pow(Math.abs(Math.cos(t)), n2);
  const t2 = Math.pow(Math.abs(Math.sin(t)), n3);
  const sum = t1 + t2;
  return sum === 0 ? 1 : Math.pow(sum, -1 / n1);
}

const FOURIER_TERMS = 12;
const FOURIER_SHAPES = {
  circle:    (t) => ({ x: Math.cos(t), y: Math.sin(t) }),
  heart:     (t) => ({ x: 16*Math.pow(Math.sin(t),3)/17, y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/17 }),
  trefoil:   (t) => { const r = 1 + 0.5*Math.cos(3*t); return { x: r*Math.cos(t), y: r*Math.sin(t) }; },
  starfish:  (t) => { const r = 1 + 0.4*Math.cos(5*t); return { x: r*Math.cos(t), y: r*Math.sin(t) }; },
  blob:      (t) => { const r = 1 + 0.3*Math.sin(2*t+0.5) + 0.2*Math.cos(3*t+1) + 0.15*Math.sin(5*t+2); return { x: r*Math.cos(t), y: r*Math.sin(t) }; },
  butterfly: (t) => { const r = Math.exp(Math.sin(t)) - 2*Math.cos(4*t) + Math.pow(Math.abs(Math.sin((2*t-Math.PI)/24)), 5); return { x: r*Math.cos(t)*0.25, y: r*Math.sin(t)*0.25 }; },
  star:      (t) => { const r = superformula(t, 5, 0.3, 0.3, 0.3); return { x: r*Math.cos(t), y: r*Math.sin(t) }; },
};

function fitFourier(fn, n) {
  const N = 1024, r = [];
  let dx = 0, dy = 0;
  for (let i = 0; i < N; i++) { const t = (i/N)*Math.PI*2, p = fn(t); dx += p.x; dy += p.y; }
  r.dcX = dx/N; r.dcY = dy/N;
  for (let k = 1; k <= n; k++) {
    let cx = 0, sx = 0, cy = 0, sy = 0;
    for (let i = 0; i < N; i++) {
      const t = (i/N)*Math.PI*2, p = fn(t);
      cx += p.x*Math.cos(k*t); sx += p.x*Math.sin(k*t);
      cy += p.y*Math.cos(k*t); sy += p.y*Math.sin(k*t);
    }
    r.push({ cx: cx*2/N, sx: sx*2/N, cy: cy*2/N, sy: sy*2/N });
  }
  return r;
}

function fourierPt(t, c) {
  let x = c.dcX || 0, y = c.dcY || 0;
  for (let i = 0; i < c.length; i++) {
    const k = i + 1;
    x += c[i].cx*Math.cos(k*t) + c[i].sx*Math.sin(k*t);
    y += c[i].cy*Math.cos(k*t) + c[i].sy*Math.sin(k*t);
  }
  return { x, y };
}

const fourierCache = {};
function getFC(name) {
  if (!fourierCache[name]) fourierCache[name] = fitFourier(FOURIER_SHAPES[name], FOURIER_TERMS);
  return fourierCache[name];
}

function makeShape(name) {
  if (name === 'star') {
    return {
      getPoint(t)       { const r = superformula(t, 5, 0.3, 0.3, 0.3); return { x: r*Math.cos(t), y: r*Math.sin(t) }; },
      getPolarRadius(t) { return superformula(t, 5, 0.3, 0.3, 0.3); }
    };
  }
  const c = getFC(name);
  return {
    getPoint(t)       { return fourierPt(t, c); },
    getPolarRadius(t) { const pt = fourierPt(t, c); return Math.sqrt(pt.x*pt.x + pt.y*pt.y); }
  };
}

function arcTable(shape, n) {
  const t = [{ theta: 0, arcLen: 0 }];
  let total = 0, prev = shape.getPoint(0);
  for (let i = 1; i <= n; i++) {
    const th = (i/n)*Math.PI*2, p = shape.getPoint(th);
    total += Math.sqrt((p.x-prev.x)**2 + (p.y-prev.y)**2);
    t.push({ theta: th, arcLen: total });
    prev = p;
  }
  return { table: t, totalLen: total };
}

function arc2theta(table, target) {
  let lo = 0, hi = table.length - 1;
  while (lo < hi - 1) {
    const m = (lo + hi) >> 1;
    if (table[m].arcLen < target) lo = m; else hi = m;
  }
  const range = table[hi].arcLen - table[lo].arcLen;
  return range === 0 ? table[lo].theta : table[lo].theta + (target - table[lo].arcLen) / range * (table[hi].theta - table[lo].theta);
}

// ==============================================
// Parameter Space
// ==============================================
const OUTER_SHAPES = ['circle', 'heart', 'blob', 'starfish'];
const INNER_SHAPES = ['circle', 'star', 'trefoil', 'butterfly'];
const RATIOS       = [0.2, 0.3, 0.4, 0.5];
const PENS         = [0.4, 0.6, 0.8, 1.0];

// ==============================================
// Daily Puzzle Seeding
// ==============================================
function hashDate(dateStr) {
  let h = 0;
  for (let i = 0; i < dateStr.length; i++) {
    h = (Math.imul(31, h) + dateStr.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

function getDailyPuzzle() {
  const epoch = new Date('2026-03-29');
  const now   = new Date();
  const dateStr = now.toISOString().slice(0, 10);
  const dayNum  = Math.floor((now - epoch) / 86400000);
  const h = hashDate(dateStr);
  return {
    outerIdx:  h % 4,
    innerIdx:  (h >> 2) % 4,
    ratioIdx:  (h >> 4) % 4,
    penIdx:    (h >> 6) % 4,
    rotation:  ((h >> 8) % 360) * Math.PI / 180,
    dayNum,
    dateStr
  };
}

function getPuzzleAnswer(puzzle) {
  return {
    outer: OUTER_SHAPES[puzzle.outerIdx],
    inner: INNER_SHAPES[puzzle.innerIdx],
    ratio: RATIOS[puzzle.ratioIdx],
    pen:   PENS[puzzle.penIdx]
  };
}

// ==============================================
// Target Spirograph Rendering
// ==============================================

function computeTargetPoints(answer, puzzle, laps) {
  const sA = makeShape(answer.outer);
  const sB = makeShape(answer.inner);
  const atA = arcTable(sA, 2000);
  const atB = arcTable(sB, 2000);

  // Compute maxR from outer shape
  let maxR = 0;
  for (let i = 0; i < 500; i++) {
    const t = (i / 500) * Math.PI * 2;
    const p = sA.getPoint(t);
    const r = Math.sqrt(p.x * p.x + p.y * p.y);
    if (r > maxR) maxR = r;
  }

  const points = [];
  const step = 0.04;
  const totalDist = atA.totalLen * laps;

  for (let dist = 0; dist <= totalDist; dist += step) {
    const thetaA = arc2theta(atA.table, dist % atA.totalLen);
    const pA = sA.getPoint(thetaA);

    // Tangent via numerical derivative
    const dt = 0.001;
    const pA2 = sA.getPoint(thetaA + dt);
    let tx = pA2.x - pA.x, ty = pA2.y - pA.y;
    const tl = Math.sqrt(tx * tx + ty * ty);
    if (tl > 0) { tx /= tl; ty /= tl; }
    // Inward normal
    let nx = ty, ny = -tx;
    if (nx * pA.x + ny * pA.y > 0) { nx = -nx; ny = -ny; }

    const bPer = atB.totalLen * answer.ratio;
    const thetaB = arc2theta(atB.table, (dist % bPer) / answer.ratio);
    const rB = sB.getPolarRadius(thetaB) * answer.ratio;
    const rA = Math.sqrt(pA.x * pA.x + pA.y * pA.y);
    const clampedRB = Math.min(rB, rA * 0.9);

    const cbx = pA.x + nx * clampedRB;
    const cby = pA.y + ny * clampedRB;

    const rot = thetaA - thetaB;
    const penDist = answer.pen * answer.ratio;
    const penX = cbx + penDist * Math.cos(rot);
    const penY = cby + penDist * Math.sin(rot);

    // Apply puzzle rotation
    const rx = penX * Math.cos(puzzle.rotation) - penY * Math.sin(puzzle.rotation);
    const ry = penX * Math.sin(puzzle.rotation) + penY * Math.cos(puzzle.rotation);

    points.push({ x: rx, y: ry, maxR });
  }

  return points;
}

// State
let targetCanvas, targetCtx, targetPoints = [], targetMaxLaps = 2, drawIdx = 0, drawAnimId = null;

function initTargetCanvas() {
  targetCanvas = document.getElementById('target');
  targetCtx = targetCanvas.getContext('2d');
  const rect = targetCanvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  targetCanvas.width = rect.width * dpr;
  targetCanvas.height = rect.height * dpr;
  targetCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawTarget() {
  drawAnimId = null;
  if (!targetPoints.length) return;

  const maxR = targetPoints[0].maxR;
  const rect = targetCanvas.parentElement.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const scale = Math.min(cx, cy) * 0.62 / (maxR || 1);
  const canvasW = rect.width;

  const batchSize = 3;
  const end = Math.min(drawIdx + batchSize, targetPoints.length);

  for (let i = drawIdx; i < end; i++) {
    if (i === 0) { drawIdx = i + 1; continue; }
    const prev = targetPoints[i - 1];
    const curr = targetPoints[i];

    const px = cx + prev.x * scale;
    const py = cy + prev.y * scale;
    const qx = cx + curr.x * scale;
    const qy = cy + curr.y * scale;

    // Skip jumps > 30% of canvas width
    const jump = Math.sqrt((qx - px) ** 2 + (qy - py) ** 2);
    if (jump > canvasW * 0.3) { drawIdx = i + 1; continue; }

    const progress = i / targetPoints.length;
    const hue = 265 + progress * 60;
    const lightness = 58 + 12 * Math.sin(i * 0.01);
    targetCtx.strokeStyle = `hsla(${hue}, 65%, ${lightness}%, 0.8)`;
    targetCtx.lineWidth = 1.5;
    targetCtx.lineCap = 'round';
    targetCtx.beginPath();
    targetCtx.moveTo(px, py);
    targetCtx.lineTo(qx, qy);
    targetCtx.stroke();

    drawIdx = i + 1;
  }

  if (drawIdx < targetPoints.length) {
    drawAnimId = requestAnimationFrame(drawTarget);
  }
}

function redrawTargetInstant() {
  initTargetCanvas();
  const maxR = targetPoints.length ? targetPoints[0].maxR : 1;
  const rect = targetCanvas.parentElement.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const scale = Math.min(cx, cy) * 0.62 / (maxR || 1);
  const canvasW = rect.width;

  for (let i = 1; i < drawIdx && i < targetPoints.length; i++) {
    const prev = targetPoints[i - 1];
    const curr = targetPoints[i];
    const px = cx + prev.x * scale;
    const py = cy + prev.y * scale;
    const qx = cx + curr.x * scale;
    const qy = cy + curr.y * scale;
    const jump = Math.sqrt((qx - px) ** 2 + (qy - py) ** 2);
    if (jump > canvasW * 0.3) continue;
    const progress = i / targetPoints.length;
    const hue = 265 + progress * 60;
    const lightness = 58 + 12 * Math.sin(i * 0.01);
    targetCtx.strokeStyle = `hsla(${hue}, 65%, ${lightness}%, 0.8)`;
    targetCtx.lineWidth = 1.5;
    targetCtx.lineCap = 'round';
    targetCtx.beginPath();
    targetCtx.moveTo(px, py);
    targetCtx.lineTo(qx, qy);
    targetCtx.stroke();
  }
}

function revealMoreLaps(newLapCount) {
  if (drawAnimId) { cancelAnimationFrame(drawAnimId); drawAnimId = null; }
  const oldCount = targetPoints.length;
  targetMaxLaps = newLapCount;
  targetPoints = computeTargetPoints(currentAnswer, currentPuzzle, targetMaxLaps);
  drawIdx = Math.min(oldCount, targetPoints.length);
  drawTarget();
}

function startTarget() {
  initTargetCanvas();
  targetPoints = computeTargetPoints(currentAnswer, currentPuzzle, targetMaxLaps);
  drawIdx = 0;
  drawTarget();
}

// ==============================================
// Icon Renderers
// ==============================================
const FEEDBACK_COLORS = {
  intune:    'rgba(106, 234, 154, 0.75)',
  close:     'rgba(232, 200, 90, 0.75)',
  off:       'rgba(90, 90, 110, 0.4)',
  neutral:   'rgba(168, 152, 255, 0.7)',
  confirmed: 'rgba(106, 234, 154, 0.7)',
};

function initCanvas(canvas, size) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return ctx;
}

function drawShapeIcon(canvas, shapeName, color, size) {
  const ctx = initCanvas(canvas, size);
  const shape = makeShape(shapeName);
  let maxR = 0;
  for (let i = 0; i < 200; i++) {
    const t = i / 200;
    const pt = shape(t);
    const r = Math.sqrt(pt.x * pt.x + pt.y * pt.y);
    if (r > maxR) maxR = r;
  }
  const scale = (size / 2) * 0.7 / (maxR || 1);
  const cx = size / 2;
  const cy = size / 2;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const t = i / 300;
    const pt = shape(t);
    const x = cx + pt.x * scale;
    const y = cy + pt.y * scale;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

function drawSizeIcon(canvas, level, color, size) {
  const ctx = initCanvas(canvas, size);
  const radii = [0.18, 0.3, 0.42, 0.56];
  const r = radii[level] * (size / 2);
  const cx = size / 2;
  const cy = size / 2;
  // Fill with color at 0.12 opacity
  const fillColor = color.replace(/[\d.]+\)$/, '0.12)');
  ctx.fillStyle = fillColor;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function drawReachIcon(canvas, level, color, size) {
  const ctx = initCanvas(canvas, size);
  const distances = [0.12, 0.22, 0.32, 0.42];
  const dist = distances[level] * size;
  const cx = size / 2;
  const cy = size / 2;
  const angle = -Math.PI / 4; // 45 degrees up-right for visual clarity
  const dotX = cx + Math.cos(angle) * dist;
  const dotY = cy + Math.sin(angle) * dist;
  // Center dot at 0.25 opacity
  const dimColor = color.replace(/[\d.]+\)$/, '0.25)');
  ctx.fillStyle = dimColor;
  ctx.beginPath();
  ctx.arc(cx, cy, 1.2, 0, Math.PI * 2);
  ctx.fill();
  // Arm line at 0.25 opacity
  ctx.strokeStyle = dimColor;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(dotX, dotY);
  ctx.stroke();
  // Pen dot at full color
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(dotX, dotY, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawIcon(canvas, paramType, valueIdx, color, size) {
  if (paramType === 'outer') drawShapeIcon(canvas, OUTER_SHAPES[valueIdx], color, size);
  else if (paramType === 'inner') drawShapeIcon(canvas, INNER_SHAPES[valueIdx], color, size);
  else if (paramType === 'size') drawSizeIcon(canvas, valueIdx, color, size);
  else if (paramType === 'reach') drawReachIcon(canvas, valueIdx, color, size);
}

// ==============================================
// Game State
// ==============================================
const PARAM_TYPES  = ['outer', 'inner', 'size', 'reach'];
const PARAM_LABELS = ['Outer Shape', 'Inner Shape', 'Size', 'Reach'];
const MAX_GUESSES  = 6;

let guesses          = [];
let feedback         = [];
let currentSelection = { outer: null, inner: null, size: null, reach: null };
let gameOver         = false;

// ==============================================
// Guess Grid Builder
// ==============================================
function buildGuessRows() {
  const grid = document.getElementById('guessGrid');
  for (let row = 0; row < MAX_GUESSES; row++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'guess-row';
    rowEl.id = 'row-' + row;
    for (let col = 0; col < 4; col++) {
      const cell = document.createElement('div');
      cell.className = 'guess-cell cell-empty';
      cell.id = 'cell-' + row + '-' + col;
      rowEl.appendChild(cell);
    }
    grid.appendChild(rowEl);
  }
}

// ==============================================
// Pickers Builder
// ==============================================
function buildPickers() {
  const area = document.getElementById('pickersArea');

  for (let rowIdx = 0; rowIdx < 2; rowIdx++) {
    const pickerRow = document.createElement('div');
    pickerRow.className = 'picker-row';

    for (let colIdx = 0; colIdx < 2; colIdx++) {
      const paramIdx  = rowIdx * 2 + colIdx;
      const paramType = PARAM_TYPES[paramIdx];
      const label     = PARAM_LABELS[paramIdx];

      const group = document.createElement('div');
      group.className = 'picker-group';

      const labelEl = document.createElement('div');
      labelEl.className = 'picker-label';
      labelEl.textContent = label;
      group.appendChild(labelEl);

      const optionsEl = document.createElement('div');
      optionsEl.className = 'picker-options';
      optionsEl.id = 'picker-' + paramType;

      for (let valueIdx = 0; valueIdx < 4; valueIdx++) {
        const optEl = document.createElement('div');
        optEl.className = 'picker-option';
        optEl.dataset.param = paramType;
        optEl.dataset.idx   = valueIdx;

        const cv = document.createElement('canvas');
        drawIcon(cv, paramType, valueIdx, FEEDBACK_COLORS.neutral, 28);
        optEl.appendChild(cv);

        optEl.addEventListener('click', () => onPickerTap(paramType, valueIdx, optEl));
        optionsEl.appendChild(optEl);
      }

      group.appendChild(optionsEl);
      pickerRow.appendChild(group);
    }

    area.appendChild(pickerRow);
  }
}

// ==============================================
// Picker Interaction
// ==============================================
function onPickerTap(paramType, valueIdx, optEl) {
  if (gameOver) return;

  const pickerGroup = document.getElementById('picker-' + paramType);
  pickerGroup.querySelectorAll('.picker-option').forEach(el => {
    if (!el.classList.contains('confirmed') && !el.classList.contains('eliminated')) {
      el.classList.remove('selected');
    }
  });

  optEl.classList.add('selected');
  currentSelection[paramType] = valueIdx;

  updateCurrentRowPreview();
  checkRollReady();
}

function clearCellChildren(cell) {
  while (cell.firstChild) {
    cell.removeChild(cell.firstChild);
  }
}

function updateCurrentRowPreview() {
  const rowIdx = guesses.length;
  if (rowIdx >= MAX_GUESSES) return;

  PARAM_TYPES.forEach((paramType, col) => {
    const cell = document.getElementById('cell-' + rowIdx + '-' + col);
    const selIdx = currentSelection[paramType];

    if (selIdx !== null) {
      cell.className = 'guess-cell cell-pending';
      clearCellChildren(cell);
      const cv = document.createElement('canvas');
      drawIcon(cv, paramType, selIdx, 'rgba(122, 106, 238, 0.7)', 26);
      cell.appendChild(cv);
    } else {
      cell.className = 'guess-cell cell-empty';
      clearCellChildren(cell);
    }
  });
}

function checkRollReady() {
  const allSelected = PARAM_TYPES.every(p => currentSelection[p] !== null);
  const rollBtn = document.getElementById('rollBtn');
  if (allSelected) {
    rollBtn.removeAttribute('disabled');
  } else {
    rollBtn.setAttribute('disabled', '');
  }
}

function updateGuessCount() {
  document.getElementById('guessCount').textContent = (guesses.length + 1) + ' of 6';
}

// ==============================================
// Feedback Computation
// ==============================================
function computeFeedback(guess) {
  const answerIndices = [
    currentPuzzle.outerIdx, currentPuzzle.innerIdx,
    currentPuzzle.ratioIdx, currentPuzzle.penIdx,
  ];
  const guessIndices = [guess.outer, guess.inner, guess.size, guess.reach];
  return guessIndices.map((g, i) => {
    if (g === answerIndices[i]) return 'intune';
    if (Math.abs(g - answerIndices[i]) === 1) return 'close';
    return 'off';
  });
}

// ==============================================
// Lap Schedule
// ==============================================
const LAPS_SCHEDULE = [2, 3.5, 5, 6.5, 8, 9.5, 12];

// ==============================================
// Guess Submission
// ==============================================
function submitGuess() {
  if (gameOver) return;
  const allReady = PARAM_TYPES.every(p => currentSelection[p] !== null);
  if (!allReady) return;

  const guess = {
    outer: currentSelection.outer,
    inner: currentSelection.inner,
    size:  currentSelection.size,
    reach: currentSelection.reach,
  };

  const fb = computeFeedback(guess);
  guesses.push(guess);
  feedback.push(fb);
  animateFeedback(guesses.length - 1, guess, fb);
}

// ==============================================
// Feedback Animation
// ==============================================
function animateFeedback(rowIdx, guess, fb) {
  const guessValues = [guess.outer, guess.inner, guess.size, guess.reach];

  for (let cellIdx = 0; cellIdx < 4; cellIdx++) {
    (function(ci) {
      setTimeout(function() {
        const cell = document.getElementById('cell-' + rowIdx + '-' + ci);
        cell.className = 'guess-cell cell-' + fb[ci];
        clearCellChildren(cell);
        const canvas = document.createElement('canvas');
        cell.appendChild(canvas);
        drawIcon(canvas, PARAM_TYPES[ci], guessValues[ci], FEEDBACK_COLORS[fb[ci]], 26);

        if (ci === 3) {
          onFeedbackComplete(rowIdx, fb);
        }
      }, ci * 200);
    })(cellIdx);
  }
}

// ==============================================
// Post-Feedback Logic
// ==============================================
function onFeedbackComplete(rowIdx, fb) {
  updatePickerStates();

  const won = fb.every(function(f) { return f === 'intune'; });
  if (won) { gameOver = true; onWin(); return; }
  if (guesses.length >= MAX_GUESSES) { gameOver = true; onLose(); return; }

  if (!hardMode) {
    revealMoreLaps(LAPS_SCHEDULE[guesses.length] || 12);
  }
  saveGameState();
  resetSelectionForNextGuess();
  updateGuessCount();
  document.getElementById('rollBtn').setAttribute('disabled', '');
}

// ==============================================
// Picker State Updates
// ==============================================
function updatePickerStates() {
  PARAM_TYPES.forEach(function(paramType, paramIdx) {
    const picker = document.getElementById('picker-' + paramType);
    const options = picker.querySelectorAll('.picker-option');

    // Find confirmed index and off indices for this param
    let confirmedIdx = null;
    const offIndices = new Set();

    for (let g = 0; g < guesses.length; g++) {
      const guessVal = [guesses[g].outer, guesses[g].inner, guesses[g].size, guesses[g].reach][paramIdx];
      const fb = feedback[g][paramIdx];
      if (fb === 'intune') {
        confirmedIdx = guessVal;
      } else if (fb === 'off') {
        offIndices.add(guessVal);
      }
    }

    options.forEach(function(optEl) {
      const idx = parseInt(optEl.dataset.idx, 10);
      optEl.classList.remove('selected');

      if (confirmedIdx !== null && idx === confirmedIdx) {
        optEl.classList.add('confirmed');
        optEl.classList.remove('eliminated');
        currentSelection[paramType] = idx;
        // Redraw icon with confirmed color
        clearCellChildren(optEl);
        const cv = document.createElement('canvas');
        drawIcon(cv, paramType, idx, FEEDBACK_COLORS.confirmed, 28);
        optEl.appendChild(cv);
      } else if (confirmedIdx !== null) {
        // Param is confirmed, eliminate all others
        optEl.classList.add('eliminated');
        optEl.classList.remove('confirmed');
      } else if (offIndices.has(idx)) {
        optEl.classList.add('eliminated');
        optEl.classList.remove('confirmed');
      }
    });
  });
}

function resetSelectionForNextGuess() {
  PARAM_TYPES.forEach(function(paramType) {
    // Check if this param is confirmed
    const picker = document.getElementById('picker-' + paramType);
    const hasConfirmed = picker.querySelector('.picker-option.confirmed');
    if (!hasConfirmed) {
      currentSelection[paramType] = null;
    }
  });
  updateCurrentRowPreview();
}

// ==============================================
// Win / Lose Handlers
// ==============================================
function shareResult() {
  var emojis = { intune: '\u{1F7E2}', close: '\u{1F7E1}', off: '\u26AB' };
  var won = feedback.length > 0 && feedback[feedback.length - 1].every(function(f) { return f === 'intune'; });
  var score = won ? feedback.length + '/6' : 'X/6';
  var text = 'Spirle #' + currentPuzzle.dayNum + ' \u{1F3B5} ' + score + '\n\n';
  for (var i = 0; i < feedback.length; i++) {
    text += feedback[i].map(function(f) { return emojis[f]; }).join('') + '\n';
  }
  navigator.clipboard.writeText(text.trim()).then(function() {
    var el = document.getElementById('guessCount');
    var prev = el.textContent;
    el.textContent = 'Copied!';
    setTimeout(function() { el.textContent = prev; }, 2000);
  });
}

function onWin() {
  revealMoreLaps(12);
  saveStats(true);
  saveGameState();
  const btn = document.getElementById('rollBtn');
  btn.textContent = 'Share';
  btn.removeAttribute('disabled');
  btn.removeEventListener('click', submitGuess);
  btn.addEventListener('click', shareResult);
  document.getElementById('guessCount').textContent = 'In tune! \u{1F3B5}';
}

function onLose() {
  revealMoreLaps(12);
  saveStats(false);
  saveGameState();
  const btn = document.getElementById('rollBtn');
  btn.textContent = 'Share';
  btn.removeAttribute('disabled');
  btn.removeEventListener('click', submitGuess);
  btn.addEventListener('click', shareResult);
  document.getElementById('guessCount').textContent = currentAnswer.outer + ' + ' + currentAnswer.inner;
}

// ==============================================
// Statistics
// ==============================================
function defaultStats() {
  return { played: 0, won: 0, streak: 0, maxStreak: 0, distribution: [0,0,0,0,0,0] };
}

function loadStats() {
  try {
    return JSON.parse(localStorage.getItem('spirle-stats')) || defaultStats();
  } catch(e) { return defaultStats(); }
}

function saveStats(won) {
  var stats = loadStats();
  stats.played++;
  if (won) {
    stats.won++;
    stats.streak++;
    stats.maxStreak = Math.max(stats.maxStreak, stats.streak);
    stats.distribution[guesses.length - 1]++;
  } else {
    stats.streak = 0;
  }
  localStorage.setItem('spirle-stats', JSON.stringify(stats));
}

function renderStats() {
  var stats = loadStats();
  document.getElementById('statPlayed').textContent = stats.played;
  document.getElementById('statWin').textContent = stats.played > 0 ? Math.round(stats.won / stats.played * 100) + '%' : '0%';
  document.getElementById('statStreak').textContent = stats.streak;
  document.getElementById('statMax').textContent = stats.maxStreak;

  var container = document.getElementById('statsDistribution');
  while (container.firstChild) { container.removeChild(container.firstChild); }

  var maxCount = Math.max.apply(null, stats.distribution.concat([1]));
  var wonLastGuess = gameOver && feedback.length > 0 && feedback[feedback.length - 1].every(function(f) { return f === 'intune'; });

  for (var i = 0; i < 6; i++) {
    var row = document.createElement('div');
    row.className = 'stats-bar-row';

    var label = document.createElement('span');
    label.className = 'bar-label';
    label.textContent = (i + 1);
    row.appendChild(label);

    var bar = document.createElement('div');
    bar.className = 'stats-bar';

    var fill = document.createElement('div');
    fill.className = 'stats-bar-fill';
    if (wonLastGuess && (guesses.length - 1) === i) {
      fill.classList.add('current');
    }
    var pct = maxCount > 0 ? Math.max((stats.distribution[i] / maxCount) * 100, stats.distribution[i] > 0 ? 4 : 0) : 0;
    fill.style.width = pct + '%';
    bar.appendChild(fill);

    row.appendChild(bar);
    container.appendChild(row);
  }
}

// ==============================================
// Settings
// ==============================================
let hardMode = localStorage.getItem('spirle-hardmode') === 'true';

function buildSettingsContent() {
  var toggle = document.getElementById('toggleHard');
  if (hardMode) toggle.classList.add('on');

  toggle.addEventListener('click', function() {
    if (guesses.length > 0 && !gameOver) {
      // Prevent toggling mid-game
      return;
    }
    hardMode = !hardMode;
    localStorage.setItem('spirle-hardmode', hardMode.toString());
    if (hardMode) {
      toggle.classList.add('on');
    } else {
      toggle.classList.remove('on');
    }
  });
}

// ==============================================
// Modal Wiring
// ==============================================
function wireModals() {
  var statsModal = document.getElementById('statsModal');
  var settingsModal = document.getElementById('settingsModal');

  document.getElementById('btnStats').addEventListener('click', function() {
    renderStats();
    statsModal.classList.add('open');
  });
  document.getElementById('statsClose').addEventListener('click', function() {
    statsModal.classList.remove('open');
  });
  statsModal.addEventListener('click', function(e) {
    if (e.target === statsModal) statsModal.classList.remove('open');
  });

  document.getElementById('btnSettings').addEventListener('click', function() {
    settingsModal.classList.add('open');
  });
  document.getElementById('settingsClose').addEventListener('click', function() {
    settingsModal.classList.remove('open');
  });
  settingsModal.addEventListener('click', function(e) {
    if (e.target === settingsModal) settingsModal.classList.remove('open');
  });
}

// ==============================================
// Game State Persistence
// ==============================================
function saveGameState() {
  localStorage.setItem('spirle-state', JSON.stringify({
    dateStr: currentPuzzle.dateStr,
    guesses: guesses,
    feedback: feedback,
    gameOver: gameOver,
  }));
}

function loadGameState() {
  try {
    var state = JSON.parse(localStorage.getItem('spirle-state'));
    if (!state || state.dateStr !== currentPuzzle.dateStr) return null;
    return state;
  } catch(e) { return null; }
}

function restoreGameState() {
  var state = loadGameState();
  if (!state) return;

  for (var g = 0; g < state.guesses.length; g++) {
    guesses.push(state.guesses[g]);
    feedback.push(state.feedback[g]);

    var guess = state.guesses[g];
    var fb = state.feedback[g];
    var guessValues = [guess.outer, guess.inner, guess.size, guess.reach];

    for (var ci = 0; ci < 4; ci++) {
      var cell = document.getElementById('cell-' + g + '-' + ci);
      cell.className = 'guess-cell cell-' + fb[ci];
      clearCellChildren(cell);
      var canvas = document.createElement('canvas');
      cell.appendChild(canvas);
      drawIcon(canvas, PARAM_TYPES[ci], guessValues[ci], FEEDBACK_COLORS[fb[ci]], 26);
    }
  }

  // Set target lap count based on progress
  if (state.gameOver) {
    targetMaxLaps = 12;
  } else {
    targetMaxLaps = LAPS_SCHEDULE[guesses.length] || 12;
  }

  // Recompute and redraw target at correct lap count
  targetPoints = computeTargetPoints(currentAnswer, currentPuzzle, targetMaxLaps);
  drawIdx = targetPoints.length;
  redrawTargetInstant();

  updatePickerStates();

  gameOver = state.gameOver;

  if (gameOver) {
    var btn = document.getElementById('rollBtn');
    btn.textContent = 'Share';
    btn.removeAttribute('disabled');
    btn.removeEventListener('click', submitGuess);
    btn.addEventListener('click', shareResult);

    var won = feedback.length > 0 && feedback[feedback.length - 1].every(function(f) { return f === 'intune'; });
    if (won) {
      document.getElementById('guessCount').textContent = 'In tune! \u{1F3B5}';
    } else {
      document.getElementById('guessCount').textContent = currentAnswer.outer + ' + ' + currentAnswer.inner;
    }
  } else {
    resetSelectionForNextGuess();
    updateGuessCount();
  }
}

// ==============================================
// Initialization
// ==============================================
