<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Holographic Spirograph</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: -apple-system, sans-serif; color: #ccc; }
    canvas { display: none; }
    #status {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #555; font-family: -apple-system, monospace; font-size: 11px;
      z-index: 50; pointer-events: none; transition: opacity 0.5s; text-align: center;
    }
    #controls {
      position: fixed; right: -300px; top: 0; width: 280px; height: 100%;
      background: rgba(10,10,10,0.9); padding: 16px; overflow-y: auto; z-index: 100;
      transition: right 0.3s ease;
    }
    #controls.open { right: 0; }
    #controls-close { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
    #controls-close:hover { color: #fff; }
    #controls h2 { font-size: 16px; color: #fff; margin-bottom: 8px; }
    #controls h3 { font-size: 13px; color: #88ccff; margin: 12px 0 4px; }
    #controls label { display: block; margin-top: 6px; font-size: 11px; color: #888; text-transform: uppercase; }
    #controls input[type="range"] { width: 100%; margin-top: 2px; accent-color: #88ccff; }
    #controls select { width: 100%; margin-top: 4px; background: #222; color: #ccc; border: 1px solid #444; padding: 4px; border-radius: 4px; font-size: 12px; }
    .row { display: flex; justify-content: space-between; }
    .row .val { color: #88ccff; font-size: 12px; }
    #presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    #presets button {
      background: #222; color: #aaa; border: 1px solid #444; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    #presets button:hover { background: #333; color: #fff; }
    #controls hr { border: none; border-top: 1px solid #333; margin: 10px 0; }
    .toggle { display: flex; gap: 8px; margin-top: 4px; }
    .toggle label { margin: 0; color: #ccc; font-size: 12px; text-transform: none; }
  </style>
</head>
<body>
<div id="status"></div>
<canvas id="c"></canvas>
<div id="controls">
  <button id="controls-close">&times;</button>
  <h2>Spirograph</h2>

  <div class="toggle">
    <input type="checkbox" id="s-auto" checked>
    <label for="s-auto">Auto-cycle presets</label>
  </div>
  <div class="toggle">
    <input type="checkbox" id="s-showShapes" checked>
    <label for="s-showShapes">Show guide shapes</label>
  </div>

  <h3>Shape A (outer)</h3>
  <label>Type</label>
  <select id="sA-type">
    <option value="super">Superformula</option>
    <option value="fourier">Fourier Freeform</option>
  </select>
  <div id="sA-super-controls">
    <label>m</label>
    <div class="row"><input type="range" id="sA-m" min="2" max="12" step="2" value="4"><span class="val" id="vA-m">4</span></div>
    <label>n1</label>
    <div class="row"><input type="range" id="sA-n1" min="0.1" max="10" step="0.1" value="2"><span class="val" id="vA-n1">2</span></div>
    <label>n2</label>
    <div class="row"><input type="range" id="sA-n2" min="0.1" max="10" step="0.1" value="2"><span class="val" id="vA-n2">2</span></div>
    <label>n3</label>
    <div class="row"><input type="range" id="sA-n3" min="0.1" max="10" step="0.1" value="2"><span class="val" id="vA-n3">2</span></div>
  </div>
  <div id="sA-fourier-controls" style="display:none;">
    <label>Shape</label>
    <select id="sA-fshape">
      <option value="circle">Circle</option>
      <option value="heart">Heart</option>
      <option value="trefoil">Trefoil</option>
      <option value="starfish">Starfish</option>
      <option value="blob">Blob</option>
      <option value="figure8">Figure-8</option>
      <option value="leaf">Leaf</option>
      <option value="butterfly">Butterfly</option>
    </select>
  </div>

  <h3>Shape B (inner)</h3>
  <label>Type</label>
  <select id="sB-type">
    <option value="super">Superformula</option>
    <option value="fourier">Fourier Freeform</option>
  </select>
  <div id="sB-super-controls">
    <label>m</label>
    <div class="row"><input type="range" id="sB-m" min="2" max="12" step="2" value="4"><span class="val" id="vB-m">4</span></div>
    <label>n1</label>
    <div class="row"><input type="range" id="sB-n1" min="0.1" max="10" step="0.1" value="2"><span class="val" id="vB-n1">2</span></div>
    <label>n2</label>
    <div class="row"><input type="range" id="sB-n2" min="0.1" max="10" step="0.1" value="2"><span class="val" id="vB-n2">2</span></div>
    <label>n3</label>
    <div class="row"><input type="range" id="sB-n3" min="0.1" max="10" step="0.1" value="2"><span class="val" id="vB-n3">2</span></div>
  </div>
  <div id="sB-fourier-controls" style="display:none;">
    <label>Shape</label>
    <select id="sB-fshape">
      <option value="circle">Circle</option>
      <option value="heart">Heart</option>
      <option value="trefoil">Trefoil</option>
      <option value="starfish">Starfish</option>
      <option value="blob">Blob</option>
      <option value="figure8">Figure-8</option>
      <option value="leaf">Leaf</option>
      <option value="butterfly">Butterfly</option>
    </select>
  </div>

  <hr>
  <h3>Spirograph</h3>
  <label>Size ratio (B / A)</label>
  <div class="row"><input type="range" id="s-ratio" min="0.1" max="0.8" step="0.01" value="0.35"><span class="val" id="v-ratio">0.35</span></div>

  <label>Pen offset</label>
  <div class="row"><input type="range" id="s-pen" min="0.1" max="1.5" step="0.01" value="0.7"><span class="val" id="v-pen">0.7</span></div>

  <label>Draw speed</label>
  <div class="row"><input type="range" id="s-speed" min="0.2" max="3" step="0.1" value="1"><span class="val" id="v-speed">1</span></div>

  <label>Line width</label>
  <div class="row"><input type="range" id="s-lineWidth" min="1" max="5" step="0.5" value="2"><span class="val" id="v-lineWidth">2</span></div>

  <hr>
  <h3>Bloom</h3>
  <label>Strength</label>
  <div class="row"><input type="range" id="s-bloomStr" min="0" max="3" step="0.1" value="0.8"><span class="val" id="v-bloomStr">0.8</span></div>
  <label>Radius</label>
  <div class="row"><input type="range" id="s-bloomRad" min="0" max="2" step="0.1" value="0.4"><span class="val" id="v-bloomRad">0.4</span></div>
  <label>Threshold</label>
  <div class="row"><input type="range" id="s-bloomThr" min="0" max="1" step="0.05" value="0.2"><span class="val" id="v-bloomThr">0.2</span></div>

  <hr>
  <h3>Presets</h3>
  <div id="presets">
    <button data-p="classic">Classic</button>
    <button data-p="starflower">Starflower</button>
    <button data-p="gear">Gear</button>
    <button data-p="organic">Organic</button>
    <button data-p="heartCircle">Heart+Circle</button>
    <button data-p="trefoilStar">Trefoil+Star</button>
    <button data-p="blobBlob">Blob+Blob</button>
    <button data-p="butterflyCircle">Butterfly+Circle</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, centerX, centerY, viewScale;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  centerX = W / 2;
  centerY = H / 2;
  viewScale = Math.min(centerX, centerY) * 0.45;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  resetDrawing();
}

// ==============================================
// Generic shape interface
// Both superformula and Fourier implement: getPoint(theta) → {x, y}
// ==============================================

// --- Superformula ---
function superformula(theta, m, n1, n2, n3) {
  const t = m * theta / 4;
  const term1 = Math.pow(Math.abs(Math.cos(t)), n2);
  const term2 = Math.pow(Math.abs(Math.sin(t)), n3);
  const sum = term1 + term2;
  if (sum === 0) return 1;
  return Math.pow(sum, -1 / n1);
}

function makeSuperShape(m, n1, n2, n3) {
  return {
    type: 'super',
    getPoint(theta) {
      const r = superformula(theta, m, n1, n2, n3);
      return { x: r * Math.cos(theta), y: r * Math.sin(theta) };
    },
    getPolarRadius(theta) {
      return superformula(theta, m, n1, n2, n3);
    },
    params: { m, n1, n2, n3 },
  };
}

// --- Fourier ---
const FOURIER_TERMS = 12;

const FOURIER_SHAPES = {
  circle:    (t) => ({ x: Math.cos(t), y: Math.sin(t) }),
  heart:     (t) => ({ x: 16*Math.pow(Math.sin(t),3)/17, y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/17 }),
  trefoil:   (t) => { const r=1+0.5*Math.cos(3*t); return {x:r*Math.cos(t),y:r*Math.sin(t)}; },
  starfish:  (t) => { const r=1+0.4*Math.cos(5*t); return {x:r*Math.cos(t),y:r*Math.sin(t)}; },
  blob:      (t) => { const r=1+0.3*Math.sin(2*t+0.5)+0.2*Math.cos(3*t+1)+0.15*Math.sin(5*t+2); return {x:r*Math.cos(t),y:r*Math.sin(t)}; },
  figure8:   (t) => ({ x: Math.sin(t), y: Math.sin(2*t)*0.6 }),
  leaf:      (t) => { const r=0.5*(1+0.9*Math.cos(t))*(1+0.1*Math.cos(4*t+0.5)); return {x:r*Math.cos(t),y:r*Math.sin(t)*1.3}; },
  butterfly: (t) => { const r=Math.exp(Math.sin(t))-2*Math.cos(4*t)+Math.pow(Math.abs(Math.sin((2*t-Math.PI)/24)),5); return {x:r*Math.cos(t)*0.25,y:r*Math.sin(t)*0.25}; },
};

function fitFourier(shapeFn, nTerms) {
  const N = 1024;
  const result = [];
  let dcX = 0, dcY = 0;
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2;
    const p = shapeFn(t);
    dcX += p.x; dcY += p.y;
  }
  result.dcX = dcX / N;
  result.dcY = dcY / N;

  for (let k = 1; k <= nTerms; k++) {
    let cx = 0, sx = 0, cy = 0, sy = 0;
    for (let i = 0; i < N; i++) {
      const t = (i / N) * Math.PI * 2;
      const p = shapeFn(t);
      cx += p.x * Math.cos(k * t);
      sx += p.x * Math.sin(k * t);
      cy += p.y * Math.cos(k * t);
      sy += p.y * Math.sin(k * t);
    }
    result.push({ cx: cx*2/N, sx: sx*2/N, cy: cy*2/N, sy: sy*2/N });
  }
  return result;
}

function fourierPoint(theta, coeffs) {
  let x = coeffs.dcX || 0, y = coeffs.dcY || 0;
  for (let i = 0; i < coeffs.length; i++) {
    const k = i + 1;
    x += coeffs[i].cx * Math.cos(k*theta) + coeffs[i].sx * Math.sin(k*theta);
    y += coeffs[i].cy * Math.cos(k*theta) + coeffs[i].sy * Math.sin(k*theta);
  }
  return { x, y };
}

// Cache fitted coefficients
const fourierCache = {};
function getFourierCoeffs(name) {
  if (!fourierCache[name]) {
    fourierCache[name] = fitFourier(FOURIER_SHAPES[name], FOURIER_TERMS);
  }
  return fourierCache[name];
}

function makeFourierShape(name) {
  const coeffs = getFourierCoeffs(name);
  return {
    type: 'fourier',
    getPoint(theta) { return fourierPoint(theta, coeffs); },
    getPolarRadius(theta) {
      const p = fourierPoint(theta, coeffs);
      return Math.sqrt(p.x * p.x + p.y * p.y);
    },
    name,
    coeffs,
  };
}

// ==============================================
// Arc length (works with any shape)
// ==============================================
function computeArcTable(shape, numSamples) {
  const table = [{ theta: 0, arcLen: 0 }];
  let totalLen = 0;
  let prev = shape.getPoint(0);
  for (let i = 1; i <= numSamples; i++) {
    const theta = (i / numSamples) * Math.PI * 2;
    const p = shape.getPoint(theta);
    totalLen += Math.sqrt((p.x - prev.x) ** 2 + (p.y - prev.y) ** 2);
    table.push({ theta, arcLen: totalLen });
    prev = p;
  }
  return { table, totalLen };
}

function arcToTheta(table, targetLen) {
  let lo = 0, hi = table.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (table[mid].arcLen < targetLen) lo = mid;
    else hi = mid;
  }
  const range = table[hi].arcLen - table[lo].arcLen;
  if (range === 0) return table[lo].theta;
  const frac = (targetLen - table[lo].arcLen) / range;
  return table[lo].theta + frac * (table[hi].theta - table[lo].theta);
}

// ==============================================
// Rolling simulation (generic — works with any shape)
// ==============================================
function computeRollingPoint(dist, shapeA, shapeB, arcTableA, arcTableB, sizeRatio, penOffset) {
  const thetaA = arcToTheta(arcTableA.table, dist % arcTableA.totalLen);
  const pA = shapeA.getPoint(thetaA);

  // Tangent (numerical)
  const dt = 0.001;
  const pA2 = shapeA.getPoint(thetaA + dt);
  let tx = pA2.x - pA.x, ty = pA2.y - pA.y;
  const tLen = Math.sqrt(tx * tx + ty * ty);
  if (tLen > 0) { tx /= tLen; ty /= tLen; }

  // Inward normal
  let nx = ty, ny = -tx;
  if (nx * pA.x + ny * pA.y > 0) { nx = -nx; ny = -ny; }

  // B rotation
  const bPerimeter = arcTableB.totalLen * sizeRatio;
  const distOnB = dist % bPerimeter;
  const thetaB = arcToTheta(arcTableB.table, distOnB / sizeRatio);
  const rB = shapeB.getPolarRadius(thetaB) * sizeRatio;

  const cBx = pA.x + nx * rB;
  const cBy = pA.y + ny * rB;
  const rotation = thetaA - thetaB;
  const penDist = penOffset * sizeRatio;

  return {
    x: cBx + penDist * Math.cos(rotation),
    y: cBy + penDist * Math.sin(rotation),
  };
}

// ==============================================
// Unified shape representation for morphing
// Everything gets converted to Fourier coefficients so we can lerp smoothly.
// ==============================================
function shapeToCoeffs(shapeDesc) {
  if (shapeDesc.type === 'fourier') {
    return getFourierCoeffs(shapeDesc.name);
  }
  // Superformula → sample it and fit Fourier
  const { m, n1, n2, n3 } = shapeDesc;
  const fn = (t) => {
    const r = superformula(t, m, n1, n2, n3);
    return { x: r * Math.cos(t), y: r * Math.sin(t) };
  };
  return fitFourier(fn, FOURIER_TERMS);
}

function lerpCoeffs(a, b, t) {
  const result = [];
  result.dcX = (a.dcX || 0) * (1 - t) + (b.dcX || 0) * t;
  result.dcY = (a.dcY || 0) * (1 - t) + (b.dcY || 0) * t;
  const len = Math.max(a.length, b.length);
  for (let i = 0; i < len; i++) {
    const ac = a[i] || { cx: 0, sx: 0, cy: 0, sy: 0 };
    const bc = b[i] || { cx: 0, sx: 0, cy: 0, sy: 0 };
    result.push({
      cx: ac.cx * (1 - t) + bc.cx * t,
      sx: ac.sx * (1 - t) + bc.sx * t,
      cy: ac.cy * (1 - t) + bc.cy * t,
      sy: ac.sy * (1 - t) + bc.sy * t,
    });
  }
  return result;
}

function makeShapeFromCoeffs(coeffs) {
  return {
    type: 'coeffs',
    getPoint(theta) { return fourierPoint(theta, coeffs); },
    getPolarRadius(theta) {
      const p = fourierPoint(theta, coeffs);
      return Math.sqrt(p.x * p.x + p.y * p.y);
    },
    coeffs,
  };
}

// ==============================================
// Drawing state
// ==============================================
let shapeA, shapeB;
let sizeRatio = 0.35;
let penOffset = 0.7;
let drawSpeed = 1;
let showShapes = true;

// Morphing state
let currentCoeffsA, currentCoeffsB, currentRatio, currentPen;
let targetCoeffsA, targetCoeffsB, targetRatio, targetPen;
const LERP_RATE = 0.003;
let autoMode = false; // when true, auto-cycles through presets

let arcTableA, arcTableB;
let dist = 0;
let prevPenX = null, prevPenY = null;
let baseHue = Math.random() * 360;

let fading = false;
let fadeFrames = 0;
const FADE_DURATION = 180;
let tAtCycleStart = 0;
const MIN_CYCLE_DIST = 30;
const MAX_CYCLE_DIST = 500;

function initFromPreset(presetName) {
  const p = PRESETS[presetName];
  currentCoeffsA = shapeToCoeffs(p.A);
  currentCoeffsB = shapeToCoeffs(p.B);
  currentRatio = p.ratio;
  currentPen = p.pen;
  targetCoeffsA = currentCoeffsA;
  targetCoeffsB = currentCoeffsB;
  targetRatio = currentRatio;
  targetPen = currentPen;
  rebuildShapes();
}

function setTarget(presetName) {
  const p = PRESETS[presetName];
  targetCoeffsA = shapeToCoeffs(p.A);
  targetCoeffsB = shapeToCoeffs(p.B);
  targetRatio = p.ratio;
  targetPen = p.pen;
}

function pickRandomPreset() {
  const names = Object.keys(PRESETS);
  return names[Math.floor(Math.random() * names.length)];
}

function rebuildShapes() {
  shapeA = makeShapeFromCoeffs(currentCoeffsA);
  shapeB = makeShapeFromCoeffs(currentCoeffsB);
  sizeRatio = currentRatio;
  penOffset = currentPen;
  arcTableA = computeArcTable(shapeA, 2000);
  arcTableB = computeArcTable(shapeB, 2000);
}

function stepMorph() {
  currentCoeffsA = lerpCoeffs(currentCoeffsA, targetCoeffsA, LERP_RATE);
  currentCoeffsB = lerpCoeffs(currentCoeffsB, targetCoeffsB, LERP_RATE);
  currentRatio += (targetRatio - currentRatio) * LERP_RATE;
  currentPen += (targetPen - currentPen) * LERP_RATE;
  rebuildShapes();
}

function resetDrawing() {
  dist = 0;
  tAtCycleStart = 0;
  prevPenX = null;
  prevPenY = null;
  fading = false;
  fadeFrames = 0;
  baseHue = Math.random() * 360;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawGuideShapes();
}

function getMaxRadius(shape) {
  let maxR = 0;
  for (let i = 0; i < 500; i++) {
    const theta = (i / 500) * Math.PI * 2;
    const p = shape.getPoint(theta);
    const r = Math.sqrt(p.x * p.x + p.y * p.y);
    if (r > maxR) maxR = r;
  }
  return maxR || 1;
}

function drawGuideShapes() {
  if (!showShapes) return;
  const maxRA = getMaxRadius(shapeA);
  const guideScale = viewScale / maxRA;

  ctx.beginPath();
  for (let i = 0; i <= 500; i++) {
    const theta = (i / 500) * Math.PI * 2;
    const p = shapeA.getPoint(theta);
    const x = centerX + p.x * guideScale;
    const y = centerY + p.y * guideScale;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(136, 204, 255, 0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function hsl(h, s, l, a) { return `hsla(${h}, ${s}%, ${l}%, ${a})`; }

// ==============================================
// Read UI state and apply as immediate target
// ==============================================
function getShapeDescFromUI(which) {
  const type = document.getElementById('s' + which + '-type').value;
  if (type === 'super') {
    return {
      type: 'super',
      m: parseFloat(document.getElementById('s' + which + '-m').value),
      n1: parseFloat(document.getElementById('s' + which + '-n1').value),
      n2: parseFloat(document.getElementById('s' + which + '-n2').value),
      n3: parseFloat(document.getElementById('s' + which + '-n3').value),
    };
  }
  return { type: 'fourier', name: document.getElementById('s' + which + '-fshape').value };
}

function applyFromSliders() {
  autoMode = false;
  document.getElementById('s-auto').checked = false;
  const descA = getShapeDescFromUI('A');
  const descB = getShapeDescFromUI('B');
  targetCoeffsA = shapeToCoeffs(descA);
  targetCoeffsB = shapeToCoeffs(descB);
  targetRatio = parseFloat(document.getElementById('s-ratio').value);
  targetPen = parseFloat(document.getElementById('s-pen').value);
  // Also snap current immediately for slider changes
  currentCoeffsA = targetCoeffsA;
  currentCoeffsB = targetCoeffsB;
  currentRatio = targetRatio;
  currentPen = targetPen;
  rebuildShapes();
  drawSpeed = parseFloat(document.getElementById('s-speed').value);
  showShapes = document.getElementById('s-showShapes').checked;
}

// ==============================================
// Animation
// ==============================================
// Presets
// ==============================================
const PRESETS = {
  classic:         { A: {type:'super', m:4,n1:2,n2:2,n3:2}, B: {type:'super', m:4,n1:2,n2:2,n3:2}, ratio:0.35, pen:0.7 },
  starflower:      { A: {type:'super', m:6,n1:0.3,n2:0.3,n3:0.3}, B: {type:'super', m:4,n1:2,n2:2,n3:2}, ratio:0.3, pen:0.8 },
  gear:            { A: {type:'super', m:8,n1:0.2,n2:1.7,n3:1.7}, B: {type:'super', m:4,n1:2,n2:2,n3:2}, ratio:0.25, pen:0.6 },
  organic:         { A: {type:'super', m:4,n1:0.5,n2:1,n3:1}, B: {type:'super', m:6,n1:0.5,n2:0.5,n3:0.5}, ratio:0.4, pen:0.9 },
  heartCircle:     { A: {type:'fourier', name:'heart'}, B: {type:'super', m:4,n1:2,n2:2,n3:2}, ratio:0.25, pen:0.6 },
  trefoilStar:     { A: {type:'fourier', name:'trefoil'}, B: {type:'super', m:10,n1:0.3,n2:0.3,n3:0.3}, ratio:0.3, pen:0.7 },
  blobBlob:        { A: {type:'fourier', name:'blob'}, B: {type:'fourier', name:'blob'}, ratio:0.35, pen:0.8 },
  butterflyCircle: { A: {type:'fourier', name:'butterfly'}, B: {type:'super', m:4,n1:2,n2:2,n3:2}, ratio:0.2, pen:0.5 },
};

function applyPreset(name) {
  if (!PRESETS[name]) return;
  autoMode = false;
  document.getElementById('s-auto').checked = false;
  initFromPreset(name);
  resetDrawing();
}

function applyPresetAsTarget(name) {
  if (!PRESETS[name]) return;
  setTarget(name);
}

function toggleShapeControls(which) {
  const type = document.getElementById('s' + which + '-type').value;
  document.getElementById('s' + which + '-super-controls').style.display = type === 'super' ? '' : 'none';
  document.getElementById('s' + which + '-fourier-controls').style.display = type === 'fourier' ? '' : 'none';
}

// ==============================================
// Wire controls
// ==============================================
document.getElementById('presets').addEventListener('click', (e) => {
  if (e.target.dataset.p) applyPreset(e.target.dataset.p);
});

// Shape type toggles
for (const which of ['A', 'B']) {
  document.getElementById('s' + which + '-type').addEventListener('change', () => {
    toggleShapeControls(which);
    applyFromSliders();
    resetDrawing();
  });
  document.getElementById('s' + which + '-fshape').addEventListener('change', () => {
    applyFromSliders();
    resetDrawing();
  });
}

// All sliders trigger reset
for (const id of ['sA-m','sA-n1','sA-n2','sA-n3','sB-m','sB-n1','sB-n2','sB-n3','s-ratio','s-pen']) {
  const el = document.getElementById(id);
  const valId = id.replace('s', 'v');
  const valEl = document.getElementById(valId);
  el.addEventListener('input', () => {
    if (valEl) valEl.textContent = el.value;
    applyFromSliders();
    resetDrawing();
  });
}

document.getElementById('s-speed').addEventListener('input', (e) => {
  document.getElementById('v-speed').textContent = e.target.value;
  drawSpeed = parseFloat(e.target.value);
});

let lineWidth = 2;
document.getElementById('s-lineWidth').addEventListener('input', (e) => {
  document.getElementById('v-lineWidth').textContent = e.target.value;
  lineWidth = parseFloat(e.target.value);
});

// Bloom sliders — wired after bloomPass is created (below)

document.getElementById('s-showShapes').addEventListener('change', () => {
  showShapes = document.getElementById('s-showShapes').checked;
  resetDrawing();
});

document.getElementById('s-auto').addEventListener('change', (e) => {
  autoMode = e.target.checked;
  if (autoMode) {
    setTarget(pickRandomPreset());
  }
});

// ==============================================
// Panel toggle (tap canvas to open/close)
// ==============================================
const controlsPanel = document.getElementById('controls');
let panelOpen = false;

function openPanel() { controlsPanel.classList.add('open'); panelOpen = true; }
function closePanel() { controlsPanel.classList.remove('open'); panelOpen = false; }

document.getElementById('controls-close').addEventListener('click', (e) => {
  e.stopPropagation();
  closePanel();
});
controlsPanel.addEventListener('click', (e) => e.stopPropagation());

// Click handler will be on the GL canvas (added after it's created below)

// ==============================================
// Status display
// ==============================================
const statusEl = document.getElementById('status');
let statusTimer = null;
function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.style.opacity = '1';
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { statusEl.style.opacity = '0'; }, 4000);
}

// ==============================================
// Three.js bloom (canvas texture approach — proven)
// ==============================================
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const glRenderer = new THREE.WebGLRenderer({ antialias: true });
glRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
glRenderer.setSize(W, H);
glRenderer.setClearColor(0x000000, 1);
glRenderer.domElement.style.position = 'absolute';
glRenderer.domElement.style.top = '0';
glRenderer.domElement.style.left = '0';
glRenderer.domElement.style.zIndex = '1';
document.body.appendChild(glRenderer.domElement);

// Panel toggle on the visible GL canvas
glRenderer.domElement.addEventListener('click', () => {
  if (panelOpen) closePanel(); else openPanel();
});

const bloomScene = new THREE.Scene();
const bloomCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const canvasTexture = new THREE.CanvasTexture(canvas);
canvasTexture.minFilter = THREE.LinearFilter;
canvasTexture.magFilter = THREE.LinearFilter;

const quad = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.MeshBasicMaterial({ map: canvasTexture })
);
bloomScene.add(quad);

const composer = new EffectComposer(glRenderer);
composer.addPass(new RenderPass(bloomScene, bloomCamera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(W, H), 0.8, 0.4, 0.2
);
composer.addPass(bloomPass);

// Wire bloom sliders
document.getElementById('s-bloomStr').addEventListener('input', (e) => {
  document.getElementById('v-bloomStr').textContent = e.target.value;
  bloomPass.strength = parseFloat(e.target.value);
});
document.getElementById('s-bloomRad').addEventListener('input', (e) => {
  document.getElementById('v-bloomRad').textContent = e.target.value;
  bloomPass.radius = parseFloat(e.target.value);
});
document.getElementById('s-bloomThr').addEventListener('input', (e) => {
  document.getElementById('v-bloomThr').textContent = e.target.value;
  bloomPass.threshold = parseFloat(e.target.value);
});

// Main animation loop
function animateWithBloom() {
  requestAnimationFrame(animateWithBloom);

  // Run the canvas drawing (but stop its own rAF loop)
  stepMorph();
  const maxRA = getMaxRadius(shapeA);
  const screenScale = viewScale / maxRA;

  // Fade
  if (fading) {
    fadeFrames++;
    const alpha = 0.01 + (fadeFrames / FADE_DURATION) * 0.03;
    ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(alpha, 0.05)})`;
    ctx.fillRect(0, 0, W, H);
    if (fadeFrames >= FADE_DURATION) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      fading = false;
      fadeFrames = 0;
      drawGuideShapes();
    }
  }

  // Draw
  const step = 0.02 * drawSpeed;
  for (let i = 0; i < 4; i++) {
    dist += step;
    const pen = computeRollingPoint(dist, shapeA, shapeB, arcTableA, arcTableB, sizeRatio, penOffset);
    const sx = centerX + pen.x * screenScale;
    const sy = centerY + pen.y * screenScale;
    if (prevPenX !== null) {
      const hue = (baseHue + (dist - tAtCycleStart) * 20) % 360;
      ctx.strokeStyle = hsl(hue, 80, 60, 0.9);
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(prevPenX, prevPenY);
      ctx.lineTo(sx, sy);
      ctx.stroke();
    }
    prevPenX = sx;
    prevPenY = sy;
  }

  // Closure check
  if (!fading && dist - tAtCycleStart > MIN_CYCLE_DIST && prevPenX !== null) {
    const startPen = computeRollingPoint(tAtCycleStart, shapeA, shapeB, arcTableA, arcTableB, sizeRatio, penOffset);
    const startSx = centerX + startPen.x * screenScale;
    const startSy = centerY + startPen.y * screenScale;
    const d = Math.hypot(prevPenX - startSx, prevPenY - startSy);
    const cycleLen = dist - tAtCycleStart;
    if (d < 8 || cycleLen > MAX_CYCLE_DIST) {
      fading = true;
      fadeFrames = 0;
      baseHue = (baseHue + 60 + Math.random() * 60) % 360;
      tAtCycleStart = dist;
      if (autoMode) {
        setTarget(pickRandomPreset());
        showStatus('preset: ' + pickRandomPreset());
      }
    }
  }

  // Bloom
  canvasTexture.needsUpdate = true;
  composer.render();
}

// Override resize to also update bloom
const origResize = resize;
window.removeEventListener('resize', origResize);
window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  centerX = W / 2;
  centerY = H / 2;
  viewScale = Math.min(centerX, centerY) * 0.45;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  glRenderer.setSize(W, H);
  composer.setSize(W, H);
  resetDrawing();
});

// ==============================================
// PWA
// ==============================================
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch {}
  }
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ==============================================
// Init
// ==============================================
autoMode = true;
initFromPreset(pickRandomPreset());
// Trigger resize manually
W = window.innerWidth;
H = window.innerHeight;
canvas.width = W;
canvas.height = H;
centerX = (W - 280) / 2;
centerY = H / 2;
viewScale = Math.min(centerX, centerY) * 0.55;
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);
glRenderer.setSize(W, H);
composer.setSize(W, H);
resetDrawing();
animateWithBloom();
</script>
