<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: -apple-system, sans-serif; color: #ccc; }
    canvas { display: block; position: absolute; top: 0; left: 0; }
    #controls {
      position: fixed; right: 0; top: 0; width: 280px; height: 100%;
      background: rgba(10,10,10,0.9); padding: 16px; overflow-y: auto; z-index: 10;
    }
    #controls h2 { font-size: 16px; color: #fff; margin-bottom: 8px; }
    #controls label { display: block; margin-top: 6px; font-size: 11px; color: #888; text-transform: uppercase; }
    #controls input[type="range"] { width: 100%; margin-top: 2px; accent-color: #88ccff; }
    .row { display: flex; justify-content: space-between; }
    .row .val { color: #88ccff; font-size: 12px; }
    #presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    #presets button {
      background: #222; color: #aaa; border: 1px solid #444; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    #presets button:hover { background: #333; color: #fff; }
    #controls hr { border: none; border-top: 1px solid #333; margin: 10px 0; }
    #info { font-size: 11px; color: #555; margin-top: 10px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <h2>Fourier Freeform</h2>

  <div id="presets">
    <button data-p="circle">Circle</button>
    <button data-p="heart">Heart</button>
    <button data-p="teardrop">Teardrop</button>
    <button data-p="leaf">Leaf</button>
    <button data-p="blob">Blob</button>
    <button data-p="figure8">Figure-8</button>
    <button data-p="trefoil">Trefoil</button>
    <button data-p="butterfly">Butterfly</button>
    <button data-p="starfish">Starfish</button>
    <button data-p="random">Random</button>
  </div>

  <hr>
  <p style="font-size:11px;color:#666;">Showing the parametric curve (white) and its Fourier reconstruction (cyan). They should overlap.</p>

  <label>Number of terms</label>
  <div class="row"><input type="range" id="s-terms" min="2" max="20" step="1" value="12"><span class="val" id="v-terms">12</span></div>

  <div id="info"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cxScreen, cyScreen, drawScale;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  cxScreen = (W - 280) / 2;
  cyScreen = H / 2;
  drawScale = Math.min(cxScreen, cyScreen) * 0.6;
  render();
}

// ==============================================
// Fourier representation: raw cos/sin coefficients
// x(θ) = Σ (cx_k * cos(kθ) + sx_k * sin(kθ))
// y(θ) = Σ (cy_k * cos(kθ) + sy_k * sin(kθ))
// 4 values per term: { cx, sx, cy, sy }
// ==============================================
let numTerms = 12;
let coeffs = []; // array of { cx, sx, cy, sy } for k=1,2,3...

function fourierPoint(theta, c) {
  let x = c.dcX || 0;
  let y = c.dcY || 0;
  for (let i = 0; i < c.length; i++) {
    const k = i + 1;
    const cos_kt = Math.cos(k * theta);
    const sin_kt = Math.sin(k * theta);
    x += c[i].cx * cos_kt + c[i].sx * sin_kt;
    y += c[i].cy * cos_kt + c[i].sy * sin_kt;
  }
  return { x, y };
}

// ==============================================
// DFT fitting: sample a parametric curve, compute coefficients
// ==============================================
function fitFourier(shapeFn, nTerms) {
  const N = 1024;
  const result = [];

  // DC offset (k=0): average position
  let dcX = 0, dcY = 0;
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2;
    const p = shapeFn(t);
    dcX += p.x;
    dcY += p.y;
  }
  result.dcX = dcX / N;
  result.dcY = dcY / N;

  for (let k = 1; k <= nTerms; k++) {
    let cx = 0, sx = 0, cy = 0, sy = 0;
    for (let i = 0; i < N; i++) {
      const t = (i / N) * Math.PI * 2;
      const p = shapeFn(t);
      cx += p.x * Math.cos(k * t);
      sx += p.x * Math.sin(k * t);
      cy += p.y * Math.cos(k * t);
      sy += p.y * Math.sin(k * t);
    }
    result.push({
      cx: cx * 2 / N,
      sx: sx * 2 / N,
      cy: cy * 2 / N,
      sy: sy * 2 / N,
    });
  }
  return result;
}

// ==============================================
// Known parametric curves
// ==============================================
const SHAPES = {
  circle: (t) => ({ x: Math.cos(t), y: Math.sin(t) }),

  heart: (t) => ({
    x: 16 * Math.pow(Math.sin(t), 3) / 17,
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 17,
  }),

  teardrop: (t) => ({
    x: -0.5 * Math.cos(t) * (1 - 0.5 * Math.cos(t)),
    y: Math.sin(t) * (1 - 0.5 * Math.cos(t)),
  }),

  leaf: (t) => {
    const r = 0.5 * (1 + 0.9 * Math.cos(t)) * (1 + 0.1 * Math.cos(4 * t + 0.5));
    return { x: r * Math.cos(t), y: r * Math.sin(t) * 1.3 };
  },

  blob: (t) => {
    const r = 1 + 0.3 * Math.sin(2*t + 0.5) + 0.2 * Math.cos(3*t + 1) + 0.15 * Math.sin(5*t + 2);
    return { x: r * Math.cos(t), y: r * Math.sin(t) };
  },

  figure8: (t) => ({
    x: Math.sin(t),
    y: Math.sin(2 * t) * 0.6,
  }),

  trefoil: (t) => {
    const r = 1 + 0.5 * Math.cos(3 * t);
    return { x: r * Math.cos(t), y: r * Math.sin(t) };
  },

  butterfly: (t) => {
    const r = Math.exp(Math.sin(t)) - 2 * Math.cos(4*t) + Math.pow(Math.abs(Math.sin((2*t - Math.PI) / 24)), 5);
    return { x: r * Math.cos(t) * 0.25, y: r * Math.sin(t) * 0.25 };
  },

  starfish: (t) => {
    const r = 1 + 0.4 * Math.cos(5 * t);
    return { x: r * Math.cos(t), y: r * Math.sin(t) };
  },
};

let currentShapeName = 'heart';

// ==============================================
// Render: draw both the original curve and Fourier reconstruction
// ==============================================
function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const shapeFn = SHAPES[currentShapeName];
  if (!shapeFn) return;

  // Refit with current number of terms
  coeffs = fitFourier(shapeFn, numTerms);

  const steps = 1000;

  // Sample both curves for bounding box
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const p = shapeFn(t);
    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
  }
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const centerX = (minX + maxX) / 2;
  const centerY = (minY + maxY) / 2;
  const s = drawScale / Math.max(rangeX, rangeY) * 2;

  function toScreen(p) {
    return {
      x: cxScreen + (p.x - centerX) * s,
      y: cyScreen + (p.y - centerY) * s,
    };
  }

  // Draw original curve (white, thin)
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const sc = toScreen(shapeFn(t));
    if (i === 0) ctx.moveTo(sc.x, sc.y); else ctx.lineTo(sc.x, sc.y);
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.lineWidth = 4;
  ctx.stroke();

  // Draw Fourier reconstruction (cyan, glowing)
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const p = fourierPoint(t, coeffs);
    const sc = toScreen(p);
    if (i === 0) ctx.moveTo(sc.x, sc.y); else ctx.lineTo(sc.x, sc.y);
  }
  ctx.closePath();
  ctx.strokeStyle = '#88ccff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#88ccff';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Error metric
  let totalErr = 0;
  for (let i = 0; i < 200; i++) {
    const t = (i / 200) * Math.PI * 2;
    const orig = shapeFn(t);
    const recon = fourierPoint(t, coeffs);
    totalErr += Math.sqrt((orig.x - recon.x) ** 2 + (orig.y - recon.y) ** 2);
  }
  const avgErr = totalErr / 200;
  document.getElementById('info').textContent =
    `Shape: ${currentShapeName} | Terms: ${numTerms} | Avg error: ${avgErr.toFixed(4)}`;
}

// ==============================================
// Wire controls
// ==============================================
document.getElementById('presets').addEventListener('click', (e) => {
  const p = e.target.dataset.p;
  if (!p) return;

  if (p === 'random') {
    // Generate random coefficients directly
    coeffs = [];
    for (let k = 0; k < numTerms; k++) {
      const decay = 1 / (k + 1); // higher terms smaller
      coeffs.push({
        cx: (Math.random() * 2 - 1) * decay,
        sx: (Math.random() * 2 - 1) * decay,
        cy: (Math.random() * 2 - 1) * decay,
        sy: (Math.random() * 2 - 1) * decay,
      });
    }
    currentShapeName = 'random';
    // For random, just draw the Fourier curve (no original to compare)
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    const steps = 1000;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * Math.PI * 2;
      const p2 = fourierPoint(t, coeffs);
      if (p2.x < minX) minX = p2.x; if (p2.x > maxX) maxX = p2.x;
      if (p2.y < minY) minY = p2.y; if (p2.y > maxY) maxY = p2.y;
    }
    const rangeX = maxX - minX || 1;
    const rangeY = maxY - minY || 1;
    const centerX = (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;
    const s = drawScale / Math.max(rangeX, rangeY) * 2;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * Math.PI * 2;
      const pt = fourierPoint(t, coeffs);
      const sx = cxScreen + (pt.x - centerX) * s;
      const sy = cyScreen + (pt.y - centerY) * s;
      if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.strokeStyle = '#88ccff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#88ccff';
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.shadowBlur = 0;
    document.getElementById('info').textContent = `Shape: random | Terms: ${numTerms}`;
    return;
  }

  currentShapeName = p;
  render();
});

const termsSlider = document.getElementById('s-terms');
termsSlider.addEventListener('input', () => {
  numTerms = parseInt(termsSlider.value);
  document.getElementById('v-terms').textContent = numTerms;
  render();
});

resize();
window.addEventListener('resize', resize);
</script>
</body>
</html>
